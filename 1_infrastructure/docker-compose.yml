version: '3.8'

# Adaptado para que sea ligero en Windows (usando LocalExecutor)
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: 'false'
    # Variables para conectar con la base de datos de NIKE
    AIRFLOW_VAR_NIKE_DB_URL: postgresql://admin:adminpassword@nike_postgres/nike_dw
    # Configuración para dbt dentro de Airflow
    _PIP_ADDITIONAL_REQUIREMENTS: dbt-postgres requests
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_ENV_CUSTOM_ENV_USER: ${POSTGRES_USER}
    DBT_ENV_CUSTOM_ENV_PASS: ${POSTGRES_PASSWORD}
    DBT_ENV_CUSTOM_ENV_DB: ${POSTGRES_DB}
    DBT_ENV_CUSTOM_ENV_HOST: nike_postgres
    # GCP Configuration (Required for Cloud Target)
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-nike-data-platform}
    GCP_GCS_BUCKET: ${GCP_GCS_BUCKET:-nike-data-lake}
    GCP_BQ_DATASET: ${GCP_BQ_DATASET:-nike_dw}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp_service_account.json
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../0_data:/opt/airflow/0_data
    - ../3_dbt_project:/opt/airflow/dbt
    # Service Account Key for GCP
    - ./gcp_service_account.json:/opt/airflow/gcp_service_account.json
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow_postgres:
      condition: service_healthy
  networks:
    - nike_network

services:
  # 1. Base de Datos de NIKE (Data Warehouse)
  nike_postgres:
    image: postgres:15
    container_name: nike_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nike_network

  # 2. Base de Datos de Airflow (Metadata)
  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nike_network

  # 3. Inicializador de Airflow (Solo corre una vez)
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    networks:
      - nike_network

  # 4. Webserver de Airflow (La UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - nike_network

  # 5. Scheduler de Airflow (El cerebro)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    networks:
      - nike_network

  # 6. pgAdmin (Gestión visual)
  pgadmin:
    image: dpage/pgadmin4
    container_name: nike_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - nike_postgres
    networks:
      - nike_network

  # 7. Jupyter + PySpark (Análisis Avanzado)
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: nike_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ../2_EDA/notebooks:/home/jovyan/work
      - ../0_data:/home/jovyan/0_data
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
    networks:
      - nike_network

  # 8. dbt Transformations
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: nike_dbt
    working_dir: /usr/app
    volumes:
      - ../3_dbt_project:/usr/app
      - ../3_dbt_project/profiles.yml:/root/.dbt/profiles.yml
    environment:
      DBT_ENV_CUSTOM_ENV_USER: ${POSTGRES_USER}
      DBT_ENV_CUSTOM_ENV_PASS: ${POSTGRES_PASSWORD}
      DBT_ENV_CUSTOM_ENV_DB: ${POSTGRES_DB}
      DBT_ENV_CUSTOM_ENV_HOST: nike_postgres
    networks:
      - nike_network

  # 9. dbt Documentation (Graphical Lineage)
  dbt_docs:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: nike_dbt_docs
    working_dir: /usr/app
    ports:
      - "8082:8080"
    volumes:
      - ../3_dbt_project:/usr/app
      - ../3_dbt_project/profiles.yml:/root/.dbt/profiles.yml
    environment:
      DBT_ENV_CUSTOM_ENV_USER: ${POSTGRES_USER}
      DBT_ENV_CUSTOM_ENV_PASS: ${POSTGRES_PASSWORD}
      DBT_ENV_CUSTOM_ENV_DB: ${POSTGRES_DB}
      DBT_ENV_CUSTOM_ENV_HOST: nike_postgres
    command: ["docs", "serve", "--port", "8080", "--host", "0.0.0.0"]
    networks:
      - nike_network

  # 10. Auto-trigger Pipeline on Startup
  pipeline_trigger:
    <<: *airflow-common
    container_name: nike_pipeline_trigger
    entrypoint: /bin/bash
    command: >
      -c "
      echo 'Waiting for Airflow Scheduler (30s)...' && 
      sleep 30 && 
      airflow dags unpause ingest_nike_csvs_v1 && 
      airflow dags trigger ingest_nike_csvs_v1 &&
      echo 'Pipeline triggered successfully!'
      "
    depends_on:
      airflow-scheduler:
        condition: service_started
    networks:
      - nike_network

  # 11. Dashboard (Exploration & Visuals)
  dashboard:
    image: python:3.11-slim
    container_name: nike_dashboard
    working_dir: /app
    volumes:
      - ../4_dashboard:/app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: nike_postgres
    command: >
      sh -c "pip install streamlit psycopg2-binary pandas plotly && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    networks:
      - nike_network
    depends_on:
      nike_postgres:
        condition: service_healthy

networks:
  nike_network:
    driver: bridge
