version: '3.8'

# Adaptado para que sea ligero en Windows (usando LocalExecutor)
x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.1
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: 'false'
    # Variables para conectar con la base de datos de NIKE
    AIRFLOW_VAR_NIKE_DB_URL: postgresql://admin:adminpassword@nike_postgres/nike_dw
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ../0_data:/opt/airflow/0_data
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    airflow_postgres:
      condition: service_healthy
  networks:
    - nike_network

services:
  # 1. Base de Datos de NIKE (Data Warehouse)
  nike_postgres:
    image: postgres:15
    container_name: nike_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nike_network

  # 2. Base de Datos de Airflow (Metadata)
  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nike_network

  # 3. Inicializador de Airflow (Solo corre una vez)
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    networks:
      - nike_network

  # 4. Webserver de Airflow (La UI)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - nike_network

  # 5. Scheduler de Airflow (El cerebro)
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    networks:
      - nike_network

  # 6. pgAdmin (Gestión visual)
  pgadmin:
    image: dpage/pgadmin4
    container_name: nike_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - nike_postgres
    networks:
      - nike_network

networks:
  nike_network:
    driver: bridge
