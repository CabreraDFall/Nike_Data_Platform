version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nike_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nike_network

  kestra:
    image: kestra/kestra:latest
    container_name: nike_kestra
    command: server local
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
            postgres:
              url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
              username: ${POSTGRES_USER}
              password: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    networks:
      - nike_network

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: nike_dbt
    volumes:
      - ../2_dbt_project:/usr/app
    profiles:
      - dbt_only
    working_dir: /usr/app
    environment:
      DBT_PROFILES_DIR: .
      # Pasamos las variables al dbt de Docker
      DBT_ENV_CUSTOM_ENV_USER: ${POSTGRES_USER}
      DBT_ENV_CUSTOM_ENV_PASS: ${POSTGRES_PASSWORD}
      DBT_ENV_CUSTOM_ENV_DB: ${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - nike_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: nike_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - postgres
    networks:
      - nike_network

networks:
  nike_network:
    driver: bridge

volumes:
  postgres_data:
